<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklista</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ec;
    --surface: #faf8f4;
    --border: #dedad2;
    --text: #1a1814;
    --muted: #8a8680;
    --accent: #1a6b4a;
    --accent-light: #e6f2ec;
    --done-line: #b0ada8;
    --radius: 10px;
    --tab-active-bg: #faf8f4;
    --tab-inactive-bg: #ede9e2;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1814;
      --surface: #222018;
      --border: #3a3730;
      --text: #f0ede6;
      --muted: #7a776f;
      --accent: #3db87a;
      --accent-light: #1a3328;
      --done-line: #555250;
      --tab-active-bg: #222018;
      --tab-inactive-bg: #1a1814;
    }
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
    color: var(--text);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 14px 0;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    background: var(--tab-inactive-bg);
    color: var(--muted);
    border: none;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    letter-spacing: -0.1px;
    font-family: 'DM Sans', sans-serif;
  }

  .tab:first-child { border-radius: 16px 0 0 0; }
  .tab:last-child  { border-radius: 0 16px 0 0; }

  .tab.active {
    background: var(--tab-active-bg);
    color: var(--text);
    border-bottom: 2px solid var(--accent);
  }

  .tab i { font-size: 17px; }

  .header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bar-bg {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 4px;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 14px 28px 6px;
    min-height: 40px;
  }

  .header-done {
    color: var(--done-line);
    text-decoration: line-through;
    text-decoration-color: var(--done-line);
  }

  .items { padding: 0 12px 10px; }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .item:hover { background: rgba(128, 128, 128, 0.06); }

  .item.done .item-label {
    color: var(--done-line);
    text-decoration: line-through;
    text-decoration-color: var(--done-line);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }

  .item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkmark { display: none; width: 12px; height: 12px; }
  .item.done .checkmark { display: block; }

  .item-label {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    transition: color 0.15s;
  }

  .footer {
    border-top: 1px solid var(--border);
    padding: 13px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .reset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }

  .reset-btn:hover { color: var(--text); }

  .done-msg {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .done-msg.visible { opacity: 1; }

  .pane { display: none; }
  .pane.active { display: block; }
</style>
</head>
<body>

<div class="card">
  <div class="tabs">
    <button class="tab btn-kite" onclick="switchTab('kite', this)" aria-label="Kitesurfing">
      <i class="ti ti-wind" aria-hidden="true"></i> Kitesurfing
    </button>
    <button class="tab btn-camper" onclick="switchTab('camper', this)" aria-label="Campervan">
      <i class="ti ti-camper" aria-hidden="true"></i> Campervan
    </button>
  </div>

  <div id="pane-kite" class="pane active">
    <div class="header">
      <div class="progress-wrap">
        <div class="bar-bg"><div class="bar-fill" id="bar-kite"></div></div>
        <span class="progress-label" id="prog-kite">0 / 0</span>
      </div>
    </div>
    <div class="section-label">Sprzęt</div>
    <div class="items" id="list-kite"></div>
  </div>

  <div id="pane-camper" class="pane">
    <div class="header">
      <div class="progress-wrap">
        <div class="bar-bg"><div class="bar-fill" id="bar-camper"></div></div>
        <span class="progress-label" id="prog-camper">0 / 0</span>
      </div>
    </div>
    <div class="section-label">Na drogę</div>
    <div class="items" id="list-camper"></div>
  </div>

  <div class="footer">
    <button class="reset-btn" onclick="resetCurrent()">↺ reset</button>
    <span class="done-msg" id="done-msg">Gotowe!</span>
  </div>
</div>

<script>
  const LISTS = [{
        id: "kite",
        name: "Kite",
        value: [
            "Latawiec", "Bar", "Pompa", "Deska", "Trapez",
            "Pianka", "Buty", "Rękawiczki", "Czapka", "Kamizelka",
            "Krem UV", "Okulary", "Ręczniki", "Torba na mokre", "Etui do telefonu"
        ]
    },
    {
        id: "camper",
        name: "Camper",
        value: [
            {
                name: "Van",
                value: [
                    "Dowód rejestracyjny", "OC/ubezpieczenie", "Prawo jazdy", "Klucze zapasowe",
                    "Apteczka", "Gaśnica", "Trójkąt ostrzegawczy",
                    "Lewarek", "Klucz do koła" 
                ],
            },
            {
                name: "Elektronika",
                value: [
                    "Aparat", "Kindle",
                    "Kable iphone 2", "Kabel usb-c", "Baterie do aparatu",
                    "Ładowarki zapalniczkowe",
                    "Ładowarka 220V"
                ]
            },
            { 
                name: "Kuchnia", 
                value: [
                    "Patelnia", "Czajnik", "Garnek", "Sztućce", "Deska do krojenia", "Uchwyt do patelni",
                    "Kuchenka", "3 kartusze z gazem", "Worki na śmieci",
                ] 
            },
            { 
                name: "Jedzenie", 
                value: [
                    "Sól",
                    "Pieprz",
                    "Przyprawy",
                    "Pomidory w puszcze",
                    "Fasola w puszcze"
                ] 
            },
            {
                name: "Spanie",
                value: [
                    "Poduszki", "Kołdra", "Koc",
                ],
            },
            {
                name: "Łazienka",
                value: [
                    "Ręczniki", 
                    "Papier toaletowy",
                    "Kosmetyczki"
                ]
            }
        
    ]
  }];

  const DONE_MSGS = {
    kite: "Gotowe — czas na wodę!",
    camper: "Gotowe — ruszamy w trasę!"
  };

  const KEY = tab => `checklist__${tab}`;

  function loadState(tab) {
    try {
      const raw = localStorage.getItem(KEY(tab));
      if (raw) return JSON.parse(raw);
    } catch (e) {}

    return [];
  }

  function saveState(tab, state) {
    try { localStorage.setItem(KEY(tab), JSON.stringify(state)); } catch (e) {}
  }

  function saveActiveTab(tab) {
    try { localStorage.setItem(KEY("currentTab"), tab); } catch (e) {}
  }

  const states = {
    kite: loadState('kite'),
    camper: loadState('camper')
  };

  let currentTab = loadCurrentTab();

  function loadCurrentTab() {
    try {
      const tab = localStorage.getItem(KEY('currentTab'));
      if (tab) return tab;
    } catch (e) {}

    return 'camper';
  }

  let subHeaderState = loadSubheadState();

  function saveSubheadState(subHeaderState) {
    try { localStorage.setItem(KEY("subheadState"), JSON.stringify(subHeaderState)); } catch (e) {}
  }

  function loadSubheadState () {
    try {
      const raw = localStorage.getItem(KEY("subheadState"));
      if (raw) return JSON.parse(raw);
    } catch (e) {}

    return {};
  }

  function renderTab(tab) {
    const items = LISTS.find((l) => l.id === tab)?.value;
    const state = states[tab];

    const list = document.getElementById('list-' + tab);
    list.innerHTML = '';

    if (typeof items[0] !== "string") {

        const totalCount = getListItemsFlat(tab).length;

        items.forEach(element => {
            const doneCount = element.value.reduce((acc, item) => {
                if (state.find(i => item === i)) {
                    return acc + 1;
                } else {
                    return acc;
                }
            }, 0);

            const subHeader = element.name;
            const div = document.createElement('div');
            const listId = 'list-' + subHeader + tab;
            div.setAttribute('id', listId)

            const subHeadElem = document.createElement('div')
            subHeadElem.classList.add('section-label')
            
            const isOpen = !subHeaderState[listId] || subHeaderState[listId] === 'on';

            if (doneCount === element.value.length) {
                subHeadElem.classList.add('header-done');
            }

            subHeadElem.onclick = function ()  {
                if (isOpen) {
                    subHeaderState[listId] = 'off';
                } else {
                    subHeaderState[listId] = 'on';
                }
                saveSubheadState(subHeaderState);
                renderTab(tab);
            }

            subHeadElem.innerHTML = subHeader;
            
            const progress = document.createElement("span");
            progress.setAttribute('class', ".progress-label");
            progress.innerHTML = " " + doneCount + "/" + element.value.length;
            

            subHeadElem.appendChild(progress);
            
            const chev = document.createElement('span');
            chev.innerHTML = (isOpen ? " ▼ " : " ► ");
            subHeadElem.appendChild(chev);

            div.appendChild(subHeadElem);

            list.appendChild(div);

            renderTabItems(tab, state, element.value, listId, totalCount);
        });
    } else {
        const subHeader = '';
        const listId = 'list-' + tab;
        renderTabItems(tab, state, items, listId, items.length);
    }

  }

  function renderTabItems(tab, state, items, listId, totalCount) {
      if (subHeaderState[listId] === 'off') {
          return;
      }
    const list = document.getElementById(listId);

    let mutableState = [...state];

    items.forEach((label, i) => {
      const selected = mutableState.find(s => s === label);
      const div = document.createElement('div');
      div.className = 'item' + (!!selected ? ' done' : '');
      div.setAttribute('role', 'checkbox');
      div.setAttribute('aria-checked', state[i]);
      div.setAttribute('tabindex', '0');
      div.innerHTML = `
        <div class="checkbox">
          <svg class="checkmark" viewBox="0 0 12 12" fill="none">
            <polyline points="1.5,6 4.5,9.5 10.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="item-label">${label}</span>`;
      const toggle = () => {
        if (selected) {
            mutableState = state.filter(s => s !== label);
            console.log("filter out", mutableState);
        } else {
            mutableState = [...state, label]
            console.log("filter in", mutableState);
        }
        states[tab] = mutableState;
        saveState(tab, mutableState);
        renderTab(tab);
      };
      div.onclick = toggle;
      div.onkeydown = e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); } };
      list.appendChild(div);
    });

    const done = state.length;
    const pct = totalCount ? Math.round((done / totalCount) * 100) : 0;
    document.getElementById('bar-' + tab).style.width = pct + '%';
    document.getElementById('prog-' + tab).textContent = done + ' / ' + totalCount;

    if (tab === currentTab) {
      const msg = document.getElementById('done-msg');
      msg.textContent = DONE_MSGS[tab];
      msg.classList.toggle('visible', done === totalCount && totalCount > 0);
    }
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementsByClassName('btn-' + tab)[0].classList.add('active')

    // btn.classList.add('active');
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + tab).classList.add('active');
    const state = states[tab];
    const total = getListItemsFlat(tab).length;
    const done = state.length;
    const msg = document.getElementById('done-msg');
    msg.textContent = DONE_MSGS[tab];
    msg.classList.toggle('visible', done === total && total > 0);

    saveActiveTab(tab);
  }

  function resetCurrent() {
    states[currentTab] = [];
    saveState(currentTab, states[currentTab]);
    renderTab(currentTab);
  }

  function getListItemsFlat(tab) {
    const items =  LISTS.find(l => l.id === tab).value;
    if (typeof items[0] === "string") {
        return items;
    } else {
        let list = [];
        items.forEach(i => {
            list.push(...i.value);
        })
        return list;
    }
  }

  switchTab(currentTab);
  renderTab('kite');
  renderTab('camper');

</script>

</body>
</html>
